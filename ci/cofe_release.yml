name: Release (npm)

# To activate: move this file to `.github/workflows/cofe_release.yml`
# (kept here because the CLI's push token lacked GitHub `workflow` scope).
#
# Publishes the `cofe` CLI to npm when a version tag is pushed.
# Release flow:
#   1. bump "version" in package.json (e.g. 0.2.0)
#   2. git tag v0.2.0 && git push origin v0.2.0
# The tag must match the package.json version.
#
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      # `prepack` runs `next build` + assemble-standalone, so the published
      # tarball contains the standalone server + static assets + public + bin.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
